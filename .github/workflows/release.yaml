      - name: Build Linux binary
        run: |
          pyinstaller \
            --onefile \
            --name weaklink-modem \
            --collect-submodules weaklink \
            --collect-all sounddevice \
            --collect-all soundfile \
            src/weaklink/modem/cli.py

      - name: Stage files for packaging
        run: |
          mkdir -p pkgroot/usr/bin
          install -m 0755 dist/weaklink-modem pkgroot/usr/bin/weaklink-modem

      - name: Build .deb
        run: |
          fpm -s dir -t deb \
            -n weaklink-modem \
            -v "${{ steps.ver.outputs.version }}" \
            --description "Streaming MFSK digital modem: bytes-to-audio-and-back byte pipe." \
            --maintainer "Ivica <ivica.matic@groupnexus.co.uk>" \
            --depends libportaudio2 \
            --depends libsndfile1 \
