      - name: Alias .deb with -latest suffix
        run: cp weaklink-modem_${{ steps.ver.outputs.version }}_arm64.deb weaklink-modem_arm64-latest.deb

      - name: Upload to release
        uses: softprops/action-gh-release@v3
        with:
