name: Quality

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-check:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install system audio libs
        run: sudo apt-get update && sudo apt-get install -y libsndfile1 libportaudio2 minimodem

      - name: Install build tooling and project
        run: |
          python -m pip install --upgrade pip
          python -m pip install build poetry
          poetry config virtualenvs.create false
          poetry install --no-interaction --no-root
          python -m pip install .

      - name: Check CLI help
        run: |
          python -m minimodem_rs.main --help
          python -m weaklink.modem.cli tx --help

      - name: Run tests (unit + slow SNR sweeps)
        run: poetry run pytest -q -m "slow or not slow" -s

      - name: Build distribution artifacts
        run: python -m build
